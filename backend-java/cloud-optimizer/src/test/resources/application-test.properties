# ============================================================
# Configuração de banco em memória H2 para testes
# Ativo quando @ActiveProfiles("test") ou SPRING_PROFILES_ACTIVE=test
# ============================================================

spring.datasource.url=jdbc:h2:mem:sentinel_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Limite de alerta para testes
budget.alert.limit=40.0
