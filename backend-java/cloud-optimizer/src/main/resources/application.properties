# ============================================================
# Configurações comuns a todos os ambientes
# Credenciais ficam em application-dev.properties (local)
# ou application-prod.properties (AWS) — nunca aqui.
# ============================================================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Limite em USD para disparar alertas de orçamento
# Sobrescreva via variável de ambiente: BUDGET_ALERT_LIMIT=100.0
budget.alert.limit=40.0

# Origens permitidas no CORS (separadas por vírgula)
# Em prod, configure: CORS_ALLOWED_ORIGINS=https://meudominio.com
cors.allowed.origins=http://localhost:5500,http://localhost:3000,http://127.0.0.1:5500

# Swagger UI: http://localhost:8080/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
