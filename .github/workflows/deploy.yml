name: Sentinel CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # ─── Job 1: Testes ────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Cache do repositório local do Maven (~/.m2).
      # Evita baixar todas as dependências a cada run — acelera o build em ~60%.
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run tests
        run: mvn -f backend-java/cloud-optimizer/pom.xml clean verify
        # 'verify' roda: compile → test → package.
        # Sem -DskipTests: se um teste falhar, o pipeline para aqui.
        env:
          SPRING_PROFILES_ACTIVE: test

  # ─── Job 2: Build e Deploy ────────────────────────────────────────────────
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: test  # Só executa se o job 'test' passar

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build JAR
        run: mvn -f backend-java/cloud-optimizer/pom.xml clean package -DskipTests
        # -DskipTests aqui é intencional: os testes já rodaram no job anterior.

      - name: Deploy to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend-java/cloud-optimizer/target/*.jar"
          target: "/home/ubuntu/app"
          strip_components: 3

      - name: Restart service on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if ! type -p java > /dev/null; then
              sudo apt-get update && sudo apt-get install -y openjdk-21-jdk
            fi

            sudo bash -c 'cat <<EOF > /etc/systemd/system/sentinel.service
            [Unit]
            Description=Sentinel Cloud Optimizer Service
            After=network.target

            [Service]
            User=ubuntu
            WorkingDirectory=/home/ubuntu/app
            ExecStart=/usr/bin/java -jar /home/ubuntu/app/cloud-optimizer-0.0.1-SNAPSHOT.jar
            SuccessExitStatus=143
            Restart=always
            RestartSec=10

            [Install]
            WantedBy=multi-user.target
            EOF'

            sudo systemctl daemon-reload
            sudo systemctl enable sentinel
            sudo systemctl restart sentinel
